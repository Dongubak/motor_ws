motor_driver_node:
  ros__parameters:
    # EtherCAT 네트워크 인터페이스 이름 (ip link로 확인)
    ifname: "enP8p1s0"

    # ──────────────────────────────────────────────────────────
    # 슬레이브 구성 (총 6대)
    #   Slave 0-2: 갠트리0 (X, Z1, Z2)
    #   Slave 3-5: 갠트리1 (X, Z1, Z2)
    #
    # 사용하지 않는 축은 -1 로 설정
    # ──────────────────────────────────────────────────────────
    num_slaves: 6

    # 갠트리 0
    gantry0_x_slave_idx:  0
    gantry0_z1_slave_idx: 1
    gantry0_z2_slave_idx: 2

    # 갠트리 1
    gantry1_x_slave_idx:  3
    gantry1_z1_slave_idx: 4
    gantry1_z2_slave_idx: 5

    # ──────────────────────────────────────────────────────────
    # PDO 제어 사이클
    # ──────────────────────────────────────────────────────────
    pdo_cycle_ms: 10

    # ──────────────────────────────────────────────────────────
    # 기본 속도 / 가감속 (두 갠트리 공통)
    # ──────────────────────────────────────────────────────────
    default_velocity_rpm:  30.0     # [RPM]  ≈ 6 mm/s (X), 3 mm/s (Z)
    default_accel_rpm_s:  1000.0    # [RPM/sec]
    default_velocity_mm_s:  75.0    # [mm/s] (액션 goal 미지정 시 사용)

    # ──────────────────────────────────────────────────────────
    # 호밍 설정 (두 갠트리 공통 — 동일 기구부)
    # ──────────────────────────────────────────────────────────
    x_homing_method: 1   # 역방향(-) + NOT 리밋 스위치 + Index 펄스
    z_homing_method: 2   # 정방향(+) + POT 리밋 스위치 + Index 펄스

    homing_fast_rpm:   30.0    # 리밋 스위치 탐색 속도 [RPM]
    homing_slow_rpm:    1.0    # Index 펄스 탐색 속도  [RPM]
    homing_timeout_s: 1200.0    # 호밍 타임아웃 [초]

    # ──────────────────────────────────────────────────────────
    # Cross Coupling (Z축 이중 모터 동기화, 갠트리별 독립 적용)
    # ──────────────────────────────────────────────────────────
    enable_coupling:   true
    coupling_gain:     0.05    # [1/sec]
    max_sync_error_mm: 10.0    # 긴급정지 임계값 [mm]
    ma_window:         5       # 이동평균 윈도우 (사이클)

    # ──────────────────────────────────────────────────────────
    # 소프트웨어 리밋 — 갠트리 0
    # ──────────────────────────────────────────────────────────
    gantry0_x_soft_limit_min_mm:  0.0
    gantry0_x_soft_limit_max_mm:  1750.0
    gantry0_z_soft_limit_min_mm: -1750.0
    gantry0_z_soft_limit_max_mm:  0.1

    # ──────────────────────────────────────────────────────────
    # 소프트웨어 리밋 — 갠트리 1
    # ──────────────────────────────────────────────────────────
    gantry1_x_soft_limit_min_mm:  0.0
    gantry1_x_soft_limit_max_mm:  1750.0
    gantry1_z_soft_limit_min_mm: -1750.0
    gantry1_z_soft_limit_max_mm:  0.1

    # ──────────────────────────────────────────────────────────
    # AxisState 발행 주기
    # ──────────────────────────────────────────────────────────
    state_publish_hz: 10.0
